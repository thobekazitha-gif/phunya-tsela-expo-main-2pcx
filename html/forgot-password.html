<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>

<style>
body{
  font-family:'DM Sans',sans-serif;
  background:#fafaf9;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:white;
  width:100%;
  max-width:420px;
  padding:32px;
  border-radius:20px;
  border:1px solid #e5e7eb;
}

input{
  width:100%;
  height:48px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:14px;
}

button{
  width:100%;
  height:50px;
  border:none;
  border-radius:14px;
  margin-top:18px;
  background:#d97706;
  color:white;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
  <h1>Forgot Password</h1>
  <p style="color:#6b7280;font-size:14px;margin-top:8px;">
    Enter the email address <strong>or cell number</strong> you registered with.
    We'll send a password reset link to the email linked to your account.
  </p>

  <input
    type="text"
    id="identifier"
    placeholder="Email address or 0821234567"
    autocomplete="username"
  >
  <p id="resetMsg" style="display:none;margin-top:14px;font-size:14px;color:#16a34a;font-weight:600;"></p>
  <p id="resetErr" style="display:none;margin-top:14px;font-size:14px;color:#b91c1c;"></p>

  <button onclick="sendReset()">
    Send Reset Link
  </button>
</div>

<script>
async function sendReset() {
  var identifier = document.getElementById('identifier').value.trim();
  document.getElementById('resetMsg').style.display = 'none';
  document.getElementById('resetErr').style.display = 'none';

  if (!identifier) {
    document.getElementById('resetErr').textContent = 'Please enter your email or cell number.';
    document.getElementById('resetErr').style.display = 'block';
    return;
  }

  var result = await Auth.forgotPassword(identifier);

  if (result.ok) {
    document.getElementById('resetMsg').textContent =
      'Reset link sent! Check your email inbox (and spam folder). Click the link to set a new password.';
    document.getElementById('resetMsg').style.display = 'block';
    document.getElementById('identifier').value = '';
  } else {
    document.getElementById('resetErr').textContent = result.error;
    document.getElementById('resetErr').style.display = 'block';
  }
}
</script>

</body>
</html>
