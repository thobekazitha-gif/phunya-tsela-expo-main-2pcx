<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>

<style>
body{
  font-family:'DM Sans',sans-serif;
  background:#fafaf9;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:white;
  width:100%;
  max-width:420px;
  padding:32px;
  border-radius:20px;
  border:1px solid #e5e7eb;
}

input{
  width:100%;
  height:48px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:14px;
}

button{
  width:100%;
  height:50px;
  border:none;
  border-radius:14px;
  margin-top:18px;
  background:#d97706;
  color:white;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
  <h1>Forgot Password</h1>

  <input
    type="email"
    id="email"
    placeholder="Enter your email"
  >

  <button onclick="sendReset()">
    Send Recovery Email
  </button>
</div>

<script>
async function sendReset(){

  const email =
    document.getElementById("email").value;

  const result =
    await Auth.forgotPassword(email);

  if(result.ok){
    alert("Recovery email sent!");
  }else{
    alert(result.error);
  }

}
</script>

</body>
</html>
