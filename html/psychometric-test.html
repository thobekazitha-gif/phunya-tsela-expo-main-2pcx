<style>
  :root { --primary:#d97706; --yellow:#f59e0b; --bg:#fafaf9; --card:#fff; --border:#e5e7eb; --text:#111827; --muted:#6b7280; --radius:12px; --radius-lg:16px; --radius-xl:20px; }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  h1,h2,h3,h4 { font-family:'Sora',sans-serif; }

  #pageLoader { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; transition:opacity .3s; }
  #pageLoader.hidden { opacity:0; pointer-events:none; }
  .loader-spinner { width:36px; height:36px; border:3px solid #fde68a; border-top-color:var(--primary); border-radius:50%; animation:loadspin .7s linear infinite; }
  @keyframes loadspin { to { transform:rotate(360deg); } }

  .hero { background:linear-gradient(135deg,var(--primary) 0%,var(--yellow) 100%); color:white; padding:40px 16px 36px; }
  .hero-inner { max-width:680px; margin:0 auto; }
  .back-btn { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,.8); font-size:14px; font-weight:600; border:none; background:none; cursor:pointer; margin-bottom:20px; transition:color .2s; }
  .back-btn:hover { color:white; }
  .hero-row { display:flex; align-items:center; gap:16px; }
  .hero-icon { width:52px; height:52px; border-radius:16px; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; }
  .hero h1 { font-size:clamp(22px,4.5vw,32px); font-weight:800; }
  .hero .sub { font-size:13px; color:rgba(255,255,255,.75); margin-top:2px; }

  .quiz-wrap { max-width:680px; margin:0 auto; padding:32px 16px 48px; }
  .progress-bar-wrap { margin-bottom:32px; }
  .progress-info { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px; }
  .progress-track { height:8px; background:#e5e7eb; border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--yellow)); border-radius:99px; transition:width .35s ease; }

  .question-card { animation:slideIn .25s ease both; }
  @keyframes slideIn { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:none; } }
  .q-category { display:inline-block; font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; background:#fff7ed; color:var(--primary); padding:3px 12px; border-radius:99px; margin-bottom:14px; }
  .q-text { font-family:'Sora',sans-serif; font-size:clamp(17px,3vw,22px); font-weight:700; color:var(--text); margin-bottom:28px; line-height:1.4; }

  .options { display:flex; flex-direction:column; gap:10px; margin-bottom:32px; }
  .option-btn { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:var(--radius-lg); border:2px solid var(--border); background:white; cursor:pointer; text-align:left; font-size:14px; font-weight:500; color:var(--text); transition:all .15s; font-family:'DM Sans',sans-serif; }
  .option-btn:hover { border-color:rgba(217,119,6,.5); background:#fffbeb; }
  .option-btn.selected { border-color:var(--primary); background:#fff7ed; color:#92400e; }
  .option-letter { width:28px; height:28px; border-radius:50%; border:2px solid #d1d5db; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; flex-shrink:0; transition:all .15s; }
  .option-btn.selected .option-letter { background:var(--primary); border-color:var(--primary); color:white; }

  .nav-row { display:flex; gap:12px; }
  .btn-back { width:100px; height:48px; border-radius:var(--radius-lg); border:1px solid var(--border); background:white; font-family:'Sora',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:background .2s; flex-shrink:0; }
  .btn-back:hover:not(:disabled) { background:#f3f4f6; }
  .btn-back:disabled { opacity:.4; cursor:not-allowed; }
  .btn-next { flex:1; height:48px; border-radius:var(--radius-lg); background:var(--primary); color:white; font-family:'Sora',sans-serif; font-weight:800; font-size:14px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:filter .2s, transform .15s; }
  .btn-next:hover:not(:disabled) { filter:brightness(1.08); transform:translateY(-1px); }
  .btn-next:disabled { opacity:.4; cursor:not-allowed; transform:none; }
  .answered-count { text-align:center; font-size:12px; color:var(--muted); margin-top:14px; }

  #resultsSection { display:none; }
  #resultsSection.show { display:block; }

  .results-hero { padding:40px 16px 32px; color:white; }
  .results-hero.orange { background:linear-gradient(135deg,#f97316,#fb923c); }
  .results-hero.blue   { background:linear-gradient(135deg,#2563eb,#4f46e5); }
  .results-hero.purple { background:linear-gradient(135deg,#9333ea,#7c3aed); }
  .results-hero.green  { background:linear-gradient(135deg,#059669,#0d9488); }
  .results-hero.red    { background:linear-gradient(135deg,#dc2626,#e11d48); }
  .results-hero.teal   { background:linear-gradient(135deg,#0d9488,#0891b2); }
  .results-inner { max-width:760px; margin:0 auto; }
  .results-inner h1 { font-size:clamp(24px,5vw,36px); font-weight:800; }
  .results-sub { font-size:13px; opacity:.75; margin-top:4px; }
  .results-body { max-width:760px; margin:0 auto; padding:32px 16px 40px; }

  .report-header { text-align:center; margin-bottom:28px; padding-bottom:24px; border-bottom:1px solid var(--border); }
  .report-header .eyebrow { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .report-header h2 { font-size:22px; font-weight:900; }
  .report-header .byline { font-size:13px; color:var(--muted); margin-top:6px; }

  .saved-banner { background:#d1fae5; border:1px solid #6ee7b7; border-radius:var(--radius-lg); padding:12px 16px; font-size:13px; color:#065f46; display:flex; align-items:center; gap:8px; margin-bottom:20px; font-weight:600; }

  .profile-card { border-radius:var(--radius-xl); border:1px solid; padding:24px; margin-bottom:24px; }
  .profile-card.orange { background:#fff7ed; border-color:#fed7aa; }
  .profile-card.blue   { background:#eff6ff; border-color:#bfdbfe; }
  .profile-card.purple { background:#f5f3ff; border-color:#ddd6fe; }
  .profile-card.green  { background:#ecfdf5; border-color:#a7f3d0; }
  .profile-card.red    { background:#fff1f2; border-color:#fecdd3; }
  .profile-card.teal   { background:#f0fdfa; border-color:#99f6e4; }
  .profile-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:20px; }
  .profile-eyebrow { font-size:10px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; }
  .profile-type { font-size:22px; font-weight:900; }
  .profile-desc { font-size:14px; opacity:.85; margin-top:4px; }
  .profile-letter { font-size:52px; font-weight:900; opacity:.2; font-family:'Sora',sans-serif; }
  .profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:500px){ .profile-grid { grid-template-columns:1fr; } }
  .profile-grid-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
  .profile-list { list-style:none; display:flex; flex-direction:column; gap:5px; }
  .profile-list li { display:flex; align-items:center; gap:8px; font-size:13px; }
  .profile-list li::before { content:"✓"; font-size:11px; width:16px; flex-shrink:0; }

  .riasec-card { background:white; border:1px solid var(--border); border-radius:var(--radius-xl); padding:24px; margin-bottom:24px; }
  .riasec-card h3 { font-size:16px; font-weight:800; margin-bottom:18px; }
  .riasec-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .riasec-type-label { width:22px; font-size:13px; font-weight:800; text-align:center; color:var(--muted); flex-shrink:0; }
  .riasec-bar-wrap { flex:1; }
  .riasec-name-row { display:flex; justify-content:space-between; margin-bottom:4px; font-size:11px; }
  .riasec-name { font-weight:700; color:var(--text); }
  .riasec-pts { color:var(--muted); }
  .riasec-track { height:7px; background:#f3f4f6; border-radius:99px; overflow:hidden; }
  .riasec-fill { height:100%; border-radius:99px; transition:width .8s ease; }
  .riasec-fill.orange { background:linear-gradient(90deg,#f97316,#fb923c); }
  .riasec-fill.blue   { background:linear-gradient(90deg,#2563eb,#4f46e5); }
  .riasec-fill.purple { background:linear-gradient(90deg,#9333ea,#7c3aed); }
  .riasec-fill.green  { background:linear-gradient(90deg,#059669,#0d9488); }
  .riasec-fill.red    { background:linear-gradient(90deg,#dc2626,#e11d48); }
  .riasec-fill.teal   { background:linear-gradient(90deg,#0d9488,#0891b2); }
  .riasec-top-star { font-size:11px; font-weight:800; color:var(--primary); flex-shrink:0; }

  .secondary-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:24px; }
  @media(max-width:500px){ .secondary-grid { grid-template-columns:1fr; } }
  .secondary-card { border-radius:var(--radius-lg); border:1px solid; padding:16px; }
  .sec-eyebrow { font-size:9px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; }
  .sec-title { font-size:15px; font-weight:800; }
  .sec-desc { font-size:12px; opacity:.8; margin-top:4px; }

  /* ── Courses card ── */
  .courses-card { background:white; border:1px solid var(--border); border-radius:var(--radius-xl); padding:24px; margin-bottom:24px; }
  .courses-card h3 { font-size:16px; font-weight:800; margin-bottom:6px; }
  .courses-intro { font-size:13px; color:var(--muted); margin-bottom:16px; }
  .courses-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
  .course-pill { display:flex; align-items:flex-start; gap:10px; background:#f9fafb; border:1px solid var(--border); border-radius:var(--radius-lg); padding:12px 14px; }
  .course-pill-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
  .course-pill-text { flex:1; }
  .course-pill-name { font-size:13px; font-weight:700; color:var(--text); line-height:1.3; }
  .course-pill-meta { font-size:11px; color:var(--muted); margin-top:2px; }

  /* ── SETA learnership banner ── */
  .seta-banner { background:linear-gradient(135deg,#1e3a5f,#1e40af); border-radius:var(--radius-xl); padding:24px; margin-bottom:24px; color:white; display:flex; align-items:center; gap:20px; }
  .seta-icon { font-size:36px; flex-shrink:0; }
  .seta-text { flex:1; }
  .seta-text h3 { font-size:16px; font-weight:800; margin-bottom:4px; }
  .seta-text p { font-size:13px; opacity:.8; line-height:1.5; }
  .seta-btn { flex-shrink:0; display:inline-flex; align-items:center; gap:8px; background:white; color:#1e40af; font-family:'Sora',sans-serif; font-weight:800; font-size:13px; padding:10px 18px; border-radius:var(--radius-lg); text-decoration:none; transition:opacity .2s; white-space:nowrap; }
  .seta-btn:hover { opacity:.9; }
  @media(max-width:520px){ .seta-banner { flex-direction:column; align-items:flex-start; } .seta-btn { width:100%; justify-content:center; } }

  .opp-card { background:white; border:1px solid var(--border); border-radius:var(--radius-xl); padding:24px; margin-bottom:24px; }
  .opp-card h3 { font-size:16px; font-weight:800; margin-bottom:14px; }
  .opp-list { list-style:none; display:flex; flex-direction:column; gap:10px; }
  .opp-list li { display:flex; align-items:flex-start; gap:10px; font-size:13px; color:var(--muted); }
  .opp-list li::before { content:"✓"; color:var(--primary); flex-shrink:0; margin-top:1px; }

  .next-steps { background:linear-gradient(135deg,#fff7ed,#fffbeb); border:1px solid #fde68a; border-radius:var(--radius-xl); padding:24px; margin-bottom:24px; }
  .next-steps h3 { font-size:16px; font-weight:800; margin-bottom:14px; }
  .next-steps ol { list-style:decimal; padding-left:20px; display:flex; flex-direction:column; gap:8px; }
  .next-steps li { font-size:13px; color:var(--muted); line-height:1.5; }
  .next-steps strong { color:var(--text); }

  .report-footer { text-align:center; font-size:11px; color:var(--muted); border-top:1px solid var(--border); padding-top:16px; line-height:1.7; margin-bottom:32px; }

  .action-row { display:flex; flex-direction:column; gap:10px; max-width:760px; margin:0 auto; padding:0 16px 40px; }
  @media(min-width:480px){ .action-row { flex-direction:row; flex-wrap:wrap; } }
  .btn-primary { flex:1; height:52px; border-radius:var(--radius-lg); background:var(--primary); color:white; font-family:'Sora',sans-serif; font-weight:800; font-size:14px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:filter .2s; text-decoration:none; min-width:160px; }
  .btn-primary:hover { filter:brightness(1.08); }
  .btn-outline { flex:1; height:52px; border-radius:var(--radius-lg); background:white; border:1px solid var(--border); color:var(--text); font-family:'Sora',sans-serif; font-weight:700; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background .2s; text-decoration:none; min-width:160px; }
  .btn-outline:hover { background:#f3f4f6; }
  .btn-ghost { height:52px; padding:0 20px; border-radius:var(--radius-lg); background:none; border:none; color:var(--muted); font-family:'Sora',sans-serif; font-weight:700; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:8px; transition:color .2s; }
  .btn-ghost:hover { color:var(--text); }

  .btn-pdf { flex:1; height:52px; border-radius:var(--radius-lg); background:linear-gradient(135deg,#1e40af,#2563eb); color:white; font-family:'Sora',sans-serif; font-weight:800; font-size:14px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:filter .2s; min-width:160px; }
  .btn-pdf:hover { filter:brightness(1.1); }
  .btn-pdf:disabled { opacity:.6; cursor:not-allowed; }

  .btn-spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:white; border-radius:50%; animation:loadspin .6s linear infinite; display:inline-block; }
</style>
</head>

var currentQ = 0;
var answers  = {};
var _user    = null;
var _lastScores = null;
var _lastTopTypes = null;

// ── Boot ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function () {
  _user = await Auth.requireAuth();
  if (!_user) return;

  var loader = document.getElementById('pageLoader');
  loader.classList.add('hidden');
  setTimeout(function () { loader.style.display = 'none'; }, 350);

  document.getElementById("heroSub").textContent = QUESTIONS.length + " questions \u2022 ~8 minutes \u2022 Free";
  document.getElementById("answeredCount").textContent = "0 of " + QUESTIONS.length + " questions answered";
  renderQuestion();
});

function renderQuestion() {
  var q       = QUESTIONS[currentQ];
  var answered = Object.keys(answers).length;
  var pct     = Math.round((answered / QUESTIONS.length) * 100);

  document.getElementById("qLabel").textContent = "Question " + (currentQ+1) + " of " + QUESTIONS.length;
  document.getElementById("pctLabel").textContent = pct + "% complete";
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("answeredCount").textContent = answered + " of " + QUESTIONS.length + " questions answered";
  document.getElementById("btnBack").disabled = currentQ === 0;

  var sel = answers[q.id];
  document.getElementById("btnNext").disabled = sel === undefined;

  var card = document.getElementById("questionCard");
  card.innerHTML =
    '<div class="q-category">' + q.category + '</div>' +
    '<div class="q-text">' + q.text + '</div>' +
    '<div class="options">' +
    q.options.map(function(opt, idx) {
      return '<button class="option-btn ' + (sel === idx ? 'selected' : '') + '" onclick="selectAnswer(' + idx + ')">' +
        '<span class="option-letter">' + String.fromCharCode(65+idx) + '</span>' + opt.text + '</button>';
    }).join('') +
    '</div>';

  card.style.animation = "none";
  void card.offsetWidth;
  card.style.animation = "slideIn .25s ease both";
}

function selectAnswer(idx) {
  var q = QUESTIONS[currentQ];
  answers[q.id] = idx;
  document.getElementById("btnNext").disabled = false;
  document.querySelectorAll(".option-btn").forEach(function(btn, i) { btn.classList.toggle("selected", i === idx); });
  var answered = Object.keys(answers).length;
  document.getElementById("answeredCount").textContent = answered + " of " + QUESTIONS.length + " questions answered";
  document.getElementById("progressFill").style.width = Math.round((answered / QUESTIONS.length) * 100) + "%";
}

function goPrev() { if (currentQ > 0) { currentQ--; renderQuestion(); } }
function goNext() {
  if (answers[QUESTIONS[currentQ].id] === undefined) return;
  if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); }
  else calculateResults();
}

function calculateResults() {
  var scores = { R:0, I:0, A:0, S:0, E:0, C:0 };
  QUESTIONS.forEach(function(q) {
    var idx = answers[q.id];
    if (idx !== undefined) {
      var opt = q.options[idx];
      opt.types.forEach(function(t) { scores[t] += opt.weight / opt.types.length; });
    }
  });
  var sorted   = Object.keys(scores).sort(function(a,b){ return scores[b]-scores[a]; });
  var topTypes = sorted.slice(0,3);
  _lastScores   = scores;
  _lastTopTypes = topTypes;
  showResults(scores, topTypes);
}

function downloadPsychPDF(btn) {

  btn.innerHTML = '<span class="btn-spinner"></span> Generating PDF…';

  try {
    var scores   = _lastScores;
    var topTypes = _lastTopTypes;

      doc.roundedRect(margin+68, barY, barMaxW, 5, 1, 1, 'F');
      doc.setFillColor(col[0], col[1], col[2]);
      if (pct > 0) doc.roundedRect(margin+68, barY, barMaxW * pct, 5, 1, 1, 'F');
      doc.setTextColor(100,100,100);
      doc.text(pts + ' pts', W - margin - 12, barY+3.5);
      if (topTypes[0] === type) {
        doc.setTextColor(primaryColor[0], primaryColor[1], primaryColor[2]);
        doc.setFont('helvetica','bold');
        doc.text('TOP', W - margin - 28, barY+3.5);
      }
      barY += 8;
    });
    y += 64;

    // ── SA Opportunities ──
    doc.setFillColor(255,255,255);
    doc.setDrawColor(229,231,235);
    doc.roundedRect(margin, y, W-margin*2, 42, 2, 2, 'FD');
    doc.setTextColor(17,24,39);
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text('SA Opportunities for Your Profile', margin+5, y+9);
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(80,80,80);
    primary.saOpportunities.forEach(function(o, i) { doc.text('\u2022 ' + o, margin+5, y+17+(i*6)); });
    y += 48;

    // ── SETA note ──
    doc.setFillColor(239,246,255);
    doc.setDrawColor(191,219,254);
    doc.roundedRect(margin, y, W-margin*2, 18, 2, 2, 'FD');
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.setTextColor(37,99,235);
    doc.text('SETA Learnerships: Visit learnership-portal.html to browse paid learning programmes.', margin+5, y+11);
    y += 24;

    // ── Next Steps ──
    doc.setFillColor(255,251,235);
    doc.setDrawColor(253,230,138);
    doc.roundedRect(margin, y, W-margin*2, 46, 2, 2, 'FD');
    doc.setTextColor(17,24,39);
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text('Your Next Steps', margin+5, y+9);
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(80,80,80);
    var steps = [
      '1. Use the APS Calculator to find specific university courses you qualify for',
      '2. Visit the Bursary Portal to find funding for your chosen field',
      '3. Browse SETA Learnerships at learnership-portal.html — earn while you learn',
      '4. Apply for NSFAS at nsfas.org.za before the closing date (November)',
      '5. Attend the Phunya Tsela Career Expo 2026 to meet employers and universities',
    ];
    steps.forEach(function(s, i) { doc.text(s, margin+5, y+17+(i*6)); });
    y += 52;

    // ── Footer ──
    doc.setDrawColor(229,231,235);
    doc.line(margin, y, W-margin, y);
    y += 6;
    doc.setFontSize(8);
    doc.setTextColor(150,150,150);
    doc.text('Phunya Tsela Career Expo 2026  |  Kasi Career Expo  |  kasiexpo.co.za  |  Kuruman, Northern Cape', margin, y);
    doc.text('Results are indicative. Consult a registered career counsellor for professional guidance.', margin, y+5);

    doc.save('Phunya_Tsela_Career_Profile_' + (userName.replace(/\s+/g,'_') || 'Student') + '.pdf');
  } catch(e) {
    console.error('PDF error:', e);
    alert('Could not generate PDF. Please try again.');
  }

  btn.disabled = false;
  btn.innerHTML = '&#128196; Download PDF Report';
}

function restart() {
  currentQ = 0; answers = {};
  document.getElementById("quizSection").style.display = "block";
  document.getElementById("resultsSection").classList.remove("show");
  renderQuestion();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
</script>
