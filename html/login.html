<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Phunya Tsela</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js?v=5"></script>
<style>

:root {
  --primary: #d97706;
  --yellow:  #f59e0b;
  --bg:      #fafaf9;
  --border:  #e5e7eb;
  --text:    #111827;
  --muted:   #6b7280;
  --error:   #ef4444;
  --radius:  12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px 16px;
}

h1, h2, h3 { font-family: 'Sora', sans-serif; }

.back-link { text-align: center; margin-bottom: 24px; }
.back-link a { color: var(--muted); text-decoration: none; font-size: 13px; }

.card {
  width: 100%;
  max-width: 420px;
  background: white;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.07);
}

.header {
  background: linear-gradient(135deg, var(--primary), var(--yellow));
  color: white;
  text-align: center;
  padding: 32px;
}
.header h1 { font-size: 26px; font-weight: 900; margin: 0 0 4px; }
.header p  { margin: 0; font-size: 13px; opacity: .8; }

.body { padding: 32px; }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  height: 48px;
  padding: 0 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.form-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px #fde68a44;
}

/* ── Toggle tabs ── */
.id-tabs {
  display: flex;
  background: #f3f4f6;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 16px;
  gap: 4px;
}
.id-tab {
  flex: 1;
  padding: 9px 0;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  background: transparent;
  color: var(--muted);
  transition: all .18s;
}
.id-tab.active {
  background: white;
  color: var(--primary);
  box-shadow: 0 1px 6px rgba(0,0,0,.1);
}
.id-tab:hover:not(.active) { color: var(--text); }

.forgot { text-align: right; margin-top: 6px; }
.forgot a { color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 600; }

button.submit-btn {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: var(--radius-lg);
  margin-top: 8px;
  background: var(--primary);
  color: white;
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
  transition: filter .2s;
}
button.submit-btn:hover:not(:disabled) { filter: brightness(1.08); }
button.submit-btn:disabled { opacity: .6; cursor: not-allowed; }

.error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #b91c1c;
  padding: 12px 14px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  font-size: 13px;
  display: none;
}
.error.show { display: block; }

.footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #eee;
  font-size: 14px;
}
.footer a { color: var(--primary); font-weight: 700; text-decoration: none; }

.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>
<div style="width:100%;max-width:480px">
  <div class="back-link">
    <a href="index.html">← Back to Home</a>
  </div>

   <div class="card">

   <div class="header">
    <h1>Welcome Back 👋</h1>
    <p>Sign in to your Phunya Tsela account</p>
  </div>

  <div class="body">

    <div class="error" id="errorBox"></div>

    <!-- Identifier toggle -->
    <div class="form-group">
      <label>Sign In With</label>
      <div class="id-tabs">
        <button class="id-tab active" id="tabPhone" onclick="switchTab('phone')">📱 Cell Number</button>
        <button class="id-tab"        id="tabEmail" onclick="switchTab('email')">✉️ Email</button>
      </div>

      <!-- Phone -->
      <div id="phoneWrap">
        <input type="tel" id="phoneInput" placeholder="e.g. 0821234567" autocomplete="tel">
      </div>

      <!-- Email (hidden by default) -->
      <div id="emailWrap" style="display:none;">
        <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
      <div class="forgot"><a href="forgot-password.html">Forgot Password?</a></div>
    </div>

    <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In</button>

  </div>

  <div class="footer">
    Don't have an account? <a href="register.html">Register →</a>
  </div>

</div>

<script>

var currentTab = 'phone';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabPhone').classList.toggle('active', tab === 'phone');
  document.getElementById('tabEmail').classList.toggle('active', tab === 'email');
  document.getElementById('phoneWrap').style.display = tab === 'phone' ? 'block' : 'none';
  document.getElementById('emailWrap').style.display = tab === 'email' ? 'block' : 'none';
  clearError();
}

/* ── Session check ── */
(async function () {
  var user = await Auth.getSession();
  if (user) {
    var params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || 'dashboard.html';
  }
})();

function showError(msg) {
  var box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}
function clearError() {
  document.getElementById('errorBox').classList.remove('show');
}
function setLoading(yes) {
  var btn = document.getElementById('loginBtn');
  btn.disabled = yes;
  btn.innerHTML = yes ? '<span class="spinner"></span>' : 'Sign In';
}

async function doLogin() {
  clearError();

  var identifier = currentTab === 'phone'
    ? document.getElementById('phoneInput').value.trim()
    : document.getElementById('emailInput').value.trim();

  var password = document.getElementById('password').value;

  if (!identifier) {
    showError(currentTab === 'phone' ? 'Please enter your cell number.' : 'Please enter your email address.');
    return;
  }
  if (!password) { showError('Please enter your password.'); return; }

  setLoading(true);
  try {
    var result = await Auth.login({ identifier, password });
    if (result.ok) {
      var params = new URLSearchParams(window.location.search);
      window.location.href = params.get('redirect') || 'dashboard.html';
    } else {
      showError(result.error);
      setLoading(false);
    }
  } catch (e) {
    showError(e.message);
    setLoading(false);
  }
}

document.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });

</script>
</body>
</html>
