<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Phunya Tsela</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js?v=3.1"></script>
<style>
body { font-family:'DM Sans',sans-serif; background:#fafaf9; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
.card { width:100%; max-width:420px; background:white; border-radius:20px; border:1px solid #e5e7eb; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,.07); }
.header { background:linear-gradient(135deg,#d97706,#f59e0b); color:white; text-align:center; padding:32px; }
.header h1 { font-family:'Sora',sans-serif; font-size:26px; font-weight:900; margin:0 0 4px; }
.header p { margin:0; font-size:13px; opacity:.8; }
.body { padding:32px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:700; margin-bottom:6px; }
input { width:100%; height:48px; padding:0 14px; border-radius:12px; border:1px solid #e5e7eb; font-size:14px; font-family:'DM Sans',sans-serif; box-sizing:border-box; outline:none; transition:border-color .2s; }
input:focus { border-color:#d97706; box-shadow:0 0 0 3px #fde68a44; }
.forgot { text-align:right; margin-top:6px; }
.forgot a { color:#d97706; text-decoration:none; font-size:13px; font-weight:600; }
button.submit-btn { width:100%; height:50px; border:none; border-radius:14px; margin-top:8px; background:#d97706; color:white; font-family:'Sora',sans-serif; font-weight:800; font-size:15px; cursor:pointer; transition:filter .2s; }
button.submit-btn:hover { filter:brightness(1.08); }
button.submit-btn:disabled { opacity:.6; cursor:not-allowed; }
.error { background:#fef2f2; border:1px solid #fecaca; color:#b91c1c; padding:12px 14px; border-radius:12px; margin-bottom:16px; font-size:13px; display:none; }
.error.show { display:block; }
.footer { text-align:center; padding:20px; border-top:1px solid #eee; font-size:14px; }
.footer a { color:#d97706; font-weight:700; text-decoration:none; }
.spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,.3); border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; display:inline-block; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Welcome Back 👋</h1>
    <p>Sign in to your Phunya Tsela account</p>
  </div>
  <div class="body">
    <div class="error" id="errorBox"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
      <div class="forgot"><a href="forgot-password.html">Forgot Password?</a></div>
    </div>
    <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  </div>
  <div class="footer">
    Don't have an account? <a href="register.html">Register →</a>
  </div>
</div>

<script>
// Check if already logged in — redirect immediately
(async function () {
  var user = await Auth.getSession();
  if (user) {
    var params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || 'dashboard.html';
  }
})();

function showError(msg) {
  var box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}
function clearError() {
  document.getElementById('errorBox').classList.remove('show');
}
function setLoading(yes) {
  var btn = document.getElementById('loginBtn');
  btn.disabled = yes;
  btn.innerHTML = yes ? '<span class="spinner"></span>' : 'Sign In';
}

async function doLogin() {
  clearError();
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;

  if (!email)    { showError('Please enter your email.'); return; }
  if (!password) { showError('Please enter your password.'); return; }

  setLoading(true);
  try {
    var result = await Auth.login({ email, password });
    if (result.ok) {
      var params = new URLSearchParams(window.location.search);
      window.location.href = params.get('redirect') || 'dashboard.html';
    } else {
      showError(result.error);
      setLoading(false);
    }
  } catch (e) {
    showError(e.message);
    setLoading(false);
  }
}

document.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
