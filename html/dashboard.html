<style>
  :root {
    --primary: #d97706; --primary-dark: #b45309; --yellow: #f59e0b;
    --bg: #fafaf9; --border: #e5e7eb; --text: #111827; --muted: #6b7280;
    --success: #10b981; --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Sora', sans-serif; }

  #pageLoader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity .3s; }
  #pageLoader.hidden { opacity: 0; pointer-events: none; }
  .loader-spinner { width: 36px; height: 36px; border: 3px solid #fde68a; border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--yellow) 100%); color: white; padding: 40px 16px 36px; }
  .hero-inner { max-width: 860px; margin: 0 auto; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,.8); font-size: 14px; font-weight: 600; border: none; background: none; cursor: pointer; margin-bottom: 20px; transition: color .2s; text-decoration: none; }
  .back-btn:hover { color: white; }
  .hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .hero-user { display: flex; align-items: center; gap: 16px; }
  .avatar { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-size: 22px; font-family: 'Sora', sans-serif; font-weight: 900; flex-shrink: 0; border: 2px solid rgba(255,255,255,.4); }
  .hero-name { font-size: clamp(20px,4vw,28px); font-weight: 900; }
  .hero-meta { font-size: 13px; opacity: .8; margin-top: 3px; }
  .logout-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: white; font-size: 13px; font-weight: 700; font-family: 'DM Sans', sans-serif; padding: 9px 16px; border-radius: 10px; cursor: pointer; transition: background .2s; white-space: nowrap; flex-shrink: 0; }
  .logout-btn:hover { background: rgba(255,255,255,.25); }
  .hero-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 24px; }
  .stat-pill { background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.25); border-radius: 99px; padding: 6px 16px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }

  .main { max-width: 860px; margin: 0 auto; padding: 36px 16px 60px; }
  .section-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* 4 columns horizontal */
  .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 40px; }
  @media (max-width: 600px) { .tool-grid { grid-template-columns: repeat(2, 1fr); } }
  .tool-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 12px; cursor: pointer; transition: all .2s; text-decoration: none; color: var(--text); display: flex; flex-direction: column; gap: 8px; }
  .tool-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(0,0,0,.08); transform: translateY(-2px); }
  .tool-card.tool-blue:hover { border-color: #2563eb; }
  .tool-icon { font-size: 22px; }
  .tool-name { font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 800; line-height: 1.3; }
  .tool-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .tool-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 99px; }
  .badge-done  { background: #d1fae5; color: #065f46; }
  .badge-new   { background: #fff7ed; color: #92400e; }
  .badge-avail { background: #eff6ff; color: #1d4ed8; }

  .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .clear-btn { font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; transition: color .2s; }
  .clear-btn:hover { color: #ef4444; }
  .history-empty { background: white; border: 1px dashed var(--border); border-radius: var(--radius-lg); padding: 48px 24px; text-align: center; }
  .history-empty .emoji { font-size: 36px; margin-bottom: 12px; }
  .history-empty p { font-size: 14px; color: var(--muted); }
  .history-list { display: flex; flex-direction: column; gap: 12px; }
  .history-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .hc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .hc-icon-wrap { display: flex; align-items: center; gap: 12px; }
  .hc-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .hc-icon.psych { background: linear-gradient(135deg, #f97316, #fb923c); }
  .hc-icon.aps   { background: linear-gradient(135deg, #2563eb, #4f46e5); }
  .hc-label { font-size: 15px; font-weight: 800; }
  .hc-date  { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .btn-pdf-sm { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg,#1e40af,#2563eb); color: white; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 12px; padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; transition: filter .2s; flex-shrink: 0; }
  .btn-pdf-sm:hover { filter: brightness(1.1); }
  .btn-pdf-sm:disabled { opacity: .6; cursor: not-allowed; }
  .btn-spinner-sm { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.4); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }

  .psych-result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .psych-result-box { border-radius: var(--radius); padding: 12px; border: 1px solid transparent; }
  .psych-result-box.primary { background: #fff7ed; border-color: #fde68a; }
  .psych-result-box.secondary { background: #f9fafb; border-color: var(--border); }
  .prb-eyebrow { font-size: 9px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .prb-label { font-size: 14px; font-weight: 800; }
  .riasec-mini { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .riasec-mini-row { display: flex; align-items: center; gap: 8px; }
  .riasec-mini-label { width: 14px; font-size: 11px; font-weight: 800; color: var(--muted); flex-shrink: 0; }
  .riasec-mini-track { flex: 1; height: 5px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
  .riasec-mini-fill { height: 100%; border-radius: 99px; }
  .riasec-mini-fill.orange { background: linear-gradient(90deg,#f97316,#fb923c); }
  .riasec-mini-fill.blue   { background: linear-gradient(90deg,#2563eb,#4f46e5); }
  .riasec-mini-fill.purple { background: linear-gradient(90deg,#9333ea,#7c3aed); }
  .riasec-mini-fill.green  { background: linear-gradient(90deg,#059669,#0d9488); }
  .riasec-mini-fill.red    { background: linear-gradient(90deg,#dc2626,#e11d48); }
  .riasec-mini-fill.teal   { background: linear-gradient(90deg,#0d9488,#0891b2); }
  .riasec-mini-pts { width: 28px; font-size: 10px; color: var(--muted); text-align: right; flex-shrink: 0; }

  .aps-result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 14px; }
  .aps-score-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: var(--radius); padding: 12px; text-align: center; }
  .aps-score-box .score-num { font-size: 28px; font-weight: 900; font-family: 'Sora', sans-serif; color: #1d4ed8; }
  .aps-score-box .score-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: #3b82f6; margin-top: 2px; }
  .aps-subject-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .aps-subject-tag { background: #f3f4f6; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 600; }
  .aps-subject-tag span { color: var(--primary); margin-left: 4px; font-weight: 800; }

  .action-row-card { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .retake-btn { display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid var(--border); color: var(--text); font-family: 'Sora', sans-serif; font-weight: 700; font-size: 12px; padding: 8px 14px; border-radius: 8px; text-decoration: none; cursor: pointer; transition: background .2s; }
  .retake-btn:hover { background: #f3f4f6; }

  .profile-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 24px; margin-bottom: 40px; }
  .profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .profile-field-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 4px; }
  .profile-field-value { font-size: 14px; color: var(--text); font-weight: 600; }
  .profile-field-value.empty { color: var(--muted); font-weight: 400; font-style: italic; }
</style>
</head>

function renderHistory() {
  var history   = Auth.loadHistory(_user.id);
  var container = document.getElementById('historyContainer');
  if (history.length === 0) {
    container.innerHTML = '<div class="history-empty"><div class="emoji">\uD83D\uDDC2\uFE0F</div><p>No activity yet. Complete a psychometric test or APS calculation to see your history here.</p></div>';
    return;
  }
  container.innerHTML = '<div class="history-list">' + history.map(function(entry, idx) { return renderHistoryCard(entry, idx); }).join('') + '</div>';
}

function renderHistoryCard(entry, idx) {
  var date    = new Date(entry.savedAt);
  var dateStr = date.toLocaleDateString('en-ZA', { year:'numeric', month:'short', day:'numeric' });
  var timeStr = date.toLocaleTimeString('en-ZA', { hour:'2-digit', minute:'2-digit' });

  var bodyHtml;
  if      (entry.type === 'psych' && entry.data) bodyHtml = renderPsychBody(entry.data, idx);
  else if (entry.type === 'aps'   && entry.data) bodyHtml = renderAPSBody(entry.data, idx);
  else bodyHtml = '<p style="font-size:13px;color:var(--muted)">' + (entry.summary || 'No details available.') + '</p>';

  var iconClass = entry.type === 'psych' ? 'psych' : 'aps';
  var iconEmoji = entry.type === 'psych' ? '\uD83E\uDDE0' : '\uD83D\uDCD0';
  var label     = entry.type === 'psych' ? 'Career Psychometric Test' : 'APS Calculator';

  return '<div class="history-card" id="history-entry-' + idx + '">' +
    '<div class="hc-top">' +
      '<div class="hc-icon-wrap">' +
        '<div class="hc-icon ' + iconClass + '">' + iconEmoji + '</div>' +
        '<div><div class="hc-label">' + label + '</div><div class="hc-date">' + dateStr + ' at ' + timeStr + '</div></div>' +
      '</div>' +
      '<button class="btn-pdf-sm" id="pdfBtn_' + idx + '" onclick="downloadHistoryPDF(' + idx + ', this)">' +
        '\uD83D\uDCC4 Download PDF' +
      '</button>' +
    '</div>' +
    bodyHtml +
  '</div>';
}

function renderPsychBody(data, idx) {
  var scores   = data.scores   || {};
  var topTypes = data.topTypes || [];
  if (!topTypes.length) return '<p style="font-size:13px;color:var(--muted)">Result data unavailable.</p>';

  var primary   = RIASEC_META[topTypes[0]] || {};
  var secondary = topTypes.slice(1).map(function (t) { return { type: t, meta: RIASEC_META[t] }; }).filter(function (x) { return x.meta; });
  var maxScore  = Math.max.apply(null, Object.values(scores).concat([1]));

  var riasecBars = Object.entries(scores).map(function (kv) {
    var type = kv[0], score = kv[1];
    var meta = RIASEC_META[type] || { color:'orange' };
    var pct  = Math.round((score / maxScore) * 100);
    return '<div class="riasec-mini-row"><div class="riasec-mini-label">' + type + '</div>' +
      '<div class="riasec-mini-track"><div class="riasec-mini-fill ' + meta.color + '" style="width:' + pct + '%"></div></div>' +
      '<div class="riasec-mini-pts">' + Math.round(score) + '</div></div>';
  }).join('');

  var profileBoxes = [
    '<div class="psych-result-box primary"><div class="prb-eyebrow">Primary Type</div><div class="prb-label">' + topTypes[0] + ' \u2014 ' + (primary.label || '') + '</div></div>',
  ].concat(secondary.map(function (s) {
    return '<div class="psych-result-box secondary"><div class="prb-eyebrow">Secondary</div><div class="prb-label">' + s.type + ' \u2014 ' + s.meta.label + '</div></div>';
  })).join('');

  return '<div class="psych-result-grid">' + profileBoxes + '</div>' +
    '<div class="riasec-mini">' + riasecBars + '</div>' +
    '<div class="action-row-card">' +
      '<a href="psychometric-test.html" class="retake-btn">Retake Test \u2192</a>' +
      '<a href="aps-calculator.html" class="retake-btn">\uD83D\uDCD0 Go to APS Calculator \u2192</a>' +
    '</div>';
}

function renderAPSBody(data, idx) {
  var subjects = data.subjects || [];
  var apsScore = data.apsScore || data.total || 0;

  var subjectTags = subjects.filter(function (s) { return s.name; }).map(function (s) {
    return '<span class="aps-subject-tag">' + s.name + '<span>' + (s.points || s.aps || '') + '</span></span>';
  }).join('');

  return '<div class="aps-result-grid"><div class="aps-score-box"><div class="score-num">' + apsScore + '</div><div class="score-label">APS Score</div></div></div>' +
    (subjectTags ? '<div class="aps-subject-list">' + subjectTags + '</div>' : '') +
    '<div class="action-row-card">' +
      '<a href="aps-calculator.html" class="retake-btn">\uD83D\uDCD0 Recalculate APS \u2192</a>' +
    '</div>';
}

/* ─────────────────────── PDF Helpers ─────────────────────── */
function checkPageBreak(doc, y, needed, pageH, margin, headerColor, W) {
  if (y + needed > pageH - 20) {
    doc.addPage();
    doc.setFillColor(headerColor[0], headerColor[1], headerColor[2]);
    doc.rect(0, 0, W, 8, 'F');
    return 18;
  }
  return y;
}

function addFooter(doc, W, margin) {
  var pageCount = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    var pageH = doc.internal.pageSize.getHeight();
    doc.setDrawColor(229,231,235);
    doc.line(margin, pageH - 14, W - margin, pageH - 14);
    doc.setFontSize(7); doc.setTextColor(150,150,150); doc.setFont('helvetica','normal');
    doc.text('Phunya Tsela Career Expo 2026  |  kasiexpo.co.za  |  Kuruman, Northern Cape', margin, pageH - 9);
    doc.text('Page ' + p + ' of ' + pageCount, W - margin, pageH - 9, { align: 'right' });
  }
}

/* Draw a full courses table. Returns new y. */
function drawCoursesTable(doc, y, courses, primaryColor, W, margin, pageH) {
  var rowH = 10;
  var titleH = 14;
  var tableInnerH = titleH + 7 + courses.length * rowH + 6;

  y = checkPageBreak(doc, y, tableInnerH, pageH, margin, primaryColor, W);

  doc.setFillColor(255,255,255); doc.setDrawColor(229,231,235); doc.setLineWidth(0.3);
  doc.roundedRect(margin, y, W - margin * 2, tableInnerH, 2, 2, 'FD');

  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(17,24,39);
  doc.text('Eligible Courses & Programmes', margin + 5, y + 9);

  var th = y + titleH;
  doc.setFillColor(primaryColor[0], primaryColor[1], primaryColor[2]);
  doc.rect(margin + 1, th - 1, W - margin * 2 - 2, 7, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(255,255,255);
  doc.text('COURSE / QUALIFICATION', margin + 5, th + 4);
  doc.text('INSTITUTIONS', margin + 78, th + 4);
  doc.text('MIN APS', W - margin - 40, th + 4);
  doc.text('REQUIREMENTS', W - margin - 26, th + 4);

  courses.forEach(function (c, i) {
    var ry = th + 7 + i * rowH;
    if (i % 2 === 0) { doc.setFillColor(249,250,251); doc.rect(margin + 1, ry - 1, W - margin * 2 - 2, rowH, 'F'); }
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(17,24,39);
    doc.text(c.name, margin + 5, ry + 5);
    doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80); doc.setFontSize(7);
    doc.text(c.inst || '', margin + 78, ry + 5);
    doc.setFont('helvetica','bold'); doc.setTextColor(primaryColor[0], primaryColor[1], primaryColor[2]);
    doc.text(String(c.aps || c.minAps || ''), W - margin - 40, ry + 5);
    doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
    var reqText = c.notes || c.req || '';
    if (reqText.length > 32) reqText = reqText.substring(0, 30) + '…';
    doc.text(reqText, W - margin - 26, ry + 5);
  });

  return y + tableInnerH + 8;
}

/* ─────────────────────── Psychometric PDF ─────────────────────── */
function downloadHistoryPDF(idx, btn) {
  var history = Auth.loadHistory(_user.id);
  var entry   = history[idx];
  if (!entry) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner-sm"></span> Generating...';
  try {
    if (entry.type === 'psych') generatePsychPDF(entry.data);
    else if (entry.type === 'aps') generateAPSPDF(entry.data);
  } catch(e) {
    console.error('PDF error:', e);
    alert('Could not generate PDF. Please try again.');
  }
  btn.disabled = false;
  btn.innerHTML = '\uD83D\uDCC4 Download PDF';
}

function generatePsychPDF(data) {
  var scores   = data.scores   || {};
  var topTypes = data.topTypes || [];
  if (!topTypes.length) { alert('No result data to export.'); return; }

  var primary = RIASEC_META[topTypes[0]];
  if (!primary) { alert('Could not load profile data.'); return; }

  var today    = new Date().toLocaleDateString('en-ZA', { year:'numeric', month:'long', day:'numeric' });
  var userName = (_user.firstName + ' ' + _user.lastName).trim() || 'Student';

  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ unit:'mm', format:'a4' });
  var W = 210, margin = 18, pageH = 297;
  var primaryColor = COLOR_MAP[primary.color] || [217,119,6];
  var y = 0;

  /* Header */
  doc.setFillColor(primaryColor[0], primaryColor[1], primaryColor[2]);
  doc.rect(0, 0, W, 42, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('PHUNYA TSELA CAREER EXPO 2026  |  STUDENT CAREER REPORT', margin, 14);
  doc.setFontSize(20);
  doc.text('Career Psychometric Report', margin, 27);
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text(userName + '  |  Generated: ' + today, margin, 36);
  y = 52;

  /* Primary type card */
  y = checkPageBreak(doc, y, 56, pageH, margin, primaryColor, W);
  doc.setFillColor(255,247,237); doc.setDrawColor(primaryColor[0], primaryColor[1], primaryColor[2]); doc.setLineWidth(0.5);
  doc.roundedRect(margin, y, W - margin * 2, 52, 3, 3, 'FD');
  doc.setTextColor(120,53,15); doc.setFont('helvetica','bold'); doc.setFontSize(8);
  doc.text('PRIMARY CAREER TYPE', margin + 6, y + 8);
  doc.setTextColor(primaryColor[0], primaryColor[1], primaryColor[2]); doc.setFontSize(16);
  doc.text(primary.label, margin + 6, y + 18);
  doc.setTextColor(80,80,80); doc.setFont('helvetica','normal'); doc.setFontSize(9);
  var descLines = doc.splitTextToSize(primary.description, W - margin * 2 - 12);
  doc.text(descLines, margin + 6, y + 27);
  y += 60;

  /* Traits & Careers */
  var colW = (W - margin * 2 - 8) / 2;
  y = checkPageBreak(doc, y, 56, pageH, margin, primaryColor, W);
  doc.setFillColor(249,250,251); doc.setDrawColor(229,231,235);
  doc.roundedRect(margin, y, colW, 52, 2, 2, 'FD');
  doc.setTextColor(primaryColor[0], primaryColor[1], primaryColor[2]); doc.setFont('helvetica','bold'); doc.setFontSize(8);
  doc.text('KEY TRAITS', margin + 5, y + 8);
  doc.setFont('helvetica','normal'); doc.setTextColor(55,65,81); doc.setFontSize(9);
  (primary.traits || []).forEach(function(t, i) { doc.text('\u2022 ' + t, margin + 5, y + 16 + i * 7); });

  doc.setFillColor(249,250,251); doc.setDrawColor(229,231,235);
  doc.roundedRect(margin + colW + 8, y, colW, 52, 2, 2, 'FD');
  doc.setTextColor(primaryColor[0], primaryColor[1], primaryColor[2]); doc.setFont('helvetica','bold'); doc.setFontSize(8);
  doc.text('MATCHING CAREER PATHS', margin + colW + 13, y + 8);
  doc.setFont('helvetica','normal'); doc.setTextColor(55,65,81); doc.setFontSize(9);
  (primary.careers || []).slice(0, 6).forEach(function(c, i) { doc.text('\u2022 ' + c, margin + colW + 13, y + 16 + i * 7); });
  y += 60;

  /* RIASEC bars */
  y = checkPageBreak(doc, y, 68, pageH, margin, primaryColor, W);
  var maxScore = Math.max.apply(null, Object.values(scores).concat([1]));
  doc.setFillColor(255,255,255); doc.setDrawColor(229,231,235);
  doc.roundedRect(margin, y, W - margin * 2, 62, 2, 2, 'FD');
  doc.setTextColor(17,24,39); doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('Your RIASEC Profile Scores', margin + 5, y + 9);
  var barY = y + 16, barMaxW = W - margin * 2 - 60;
  ['R','I','A','S','E','C'].forEach(function(type) {
    var p = RIASEC_META[type]; if (!p) return;
    var pts = Math.round(scores[type] || 0);
    var pct = (scores[type] || 0) / maxScore;
    var col = COLOR_MAP[p.color] || [100,100,100];
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(100,100,100);
    doc.text(type, margin + 5, barY + 3.5);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(55,65,81);
    doc.text(p.label, margin + 13, barY + 3.5);
    doc.setFillColor(243,244,246); doc.roundedRect(margin + 68, barY, barMaxW, 5, 1, 1, 'F');
    doc.setFillColor(col[0], col[1], col[2]);
    if (pct > 0) doc.roundedRect(margin + 68, barY, barMaxW * pct, 5, 1, 1, 'F');
    doc.setTextColor(100,100,100); doc.text(pts + ' pts', W - margin - 12, barY + 3.5);
    if (topTypes[0] === type) { doc.setTextColor(primaryColor[0], primaryColor[1], primaryColor[2]); doc.setFont('helvetica','bold'); doc.text('TOP', W - margin - 28, barY + 3.5); }
    barY += 9;
  });
  y += 68;

  /* SA Opportunities */
  var oppsNeeded = 14 + (primary.saOpps || []).length * 7 + 6;
  y = checkPageBreak(doc, y, oppsNeeded, pageH, margin, primaryColor, W);
  doc.setFillColor(255,255,255); doc.setDrawColor(229,231,235);
  doc.roundedRect(margin, y, W - margin * 2, oppsNeeded, 2, 2, 'FD');
  doc.setTextColor(17,24,39); doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('SA Opportunities for Your Profile', margin + 5, y + 9);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(80,80,80);
  (primary.saOpps || []).forEach(function(o, i) { doc.text('\u2022 ' + o, margin + 5, y + 17 + i * 7); });
  y += oppsNeeded + 6;

  /* Eligible Courses for primary type */
  if (primary.courses && primary.courses.length) {
    y = drawCoursesTable(doc, y, primary.courses, primaryColor, W, margin, pageH);
  }

  /* Secondary types */
  topTypes.slice(1).forEach(function(type) {
    var meta = RIASEC_META[type]; if (!meta) return;
    var secColor = COLOR_MAP[meta.color] || [100,100,100];
    y = checkPageBreak(doc, y, 64, pageH, margin, primaryColor, W);

    doc.setFillColor(249,250,251); doc.setDrawColor(secColor[0], secColor[1], secColor[2]); doc.setLineWidth(0.3);
    doc.roundedRect(margin, y, W - margin * 2, 56, 2, 2, 'FD');
    doc.setTextColor(secColor[0], secColor[1], secColor[2]); doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text('SECONDARY TYPE', margin + 5, y + 8);
    doc.setFontSize(13); doc.text(meta.label, margin + 5, y + 16);
    doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80); doc.setFontSize(8);
    var sLines = doc.splitTextToSize(meta.description, W - margin * 2 - 10);
    doc.text(sLines, margin + 5, y + 23);
    var halfW = (W - margin * 2 - 8) / 2;
    doc.setFont('helvetica','bold'); doc.setTextColor(secColor[0], secColor[1], secColor[2]); doc.setFontSize(7);
    doc.text('TRAITS', margin + 5, y + 35);
    doc.text('CAREERS', margin + halfW + 13, y + 35);
    doc.setFont('helvetica','normal'); doc.setTextColor(55,65,81); doc.setFontSize(8);
    (meta.traits || []).slice(0, 3).forEach(function(t, i) { doc.text('\u2022 ' + t, margin + 5, y + 41 + i * 5); });
    (meta.careers || []).slice(0, 3).forEach(function(c, i) { doc.text('\u2022 ' + c, margin + halfW + 13, y + 41 + i * 5); });
    y += 62;

    /* Eligible courses for secondary type (first 4 only to keep it concise) */
    if (meta.courses && meta.courses.length) {
      y = drawCoursesTable(doc, y, meta.courses.slice(0, 4), secColor, W, margin, pageH);
    }
  });

  /* Bursary reminder */
  y = checkPageBreak(doc, y, 28, pageH, margin, primaryColor, W);
  doc.setFillColor(236,253,245); doc.setDrawColor(167,243,208);
  doc.roundedRect(margin, y, W - margin * 2, 24, 2, 2, 'FD');
  doc.setTextColor(6,95,70); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('Funding Opportunities', margin + 5, y + 8);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(5,150,105);
  doc.text('NSFAS: nsfas.org.za  |  Funza Lushaka: funzalushaka.doe.gov.za  |  NRF: nrf.ac.za', margin + 5, y + 15);
  doc.text('ISFAP: isfap.co.za  |  Ikusasa: ikusasasfap.org  |  SAICA Thuthuka (Accounting)', margin + 5, y + 21);
  y += 30;

  addFooter(doc, W, margin);
  doc.save('Phunya_Tsela_Career_Profile_' + userName.replace(/\s+/g, '_') + '.pdf');
}

/* ─────────────────────── APS PDF ─────────────────────── */
function generateAPSPDF(data) {
  var subjects = data.subjects || [];
  var apsScore = data.apsScore || data.total || 0;
  var mathType = data.mathType || 'mathematics';

  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ unit:'mm', format:'a4' });
  var W = 210, margin = 18, pageH = 297;
  var today    = new Date().toLocaleDateString('en-ZA', { year:'numeric', month:'long', day:'numeric' });
  var userName = (_user.firstName + ' ' + _user.lastName).trim() || 'Student';
  var headerColor = [217,119,6];
  var y = 0;

  /* Header */
  doc.setFillColor(217,119,6); doc.rect(0, 0, W, 42, 'F');
  doc.setFillColor(245,158,11); doc.rect(0, 36, W, 6, 'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('PHUNYA TSELA CAREER EXPO 2026  |  APS CALCULATOR REPORT', margin, 14);
  doc.setFontSize(20); doc.text('APS Score Report', margin, 27);
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text(userName + '  |  Generated: ' + today, margin, 36);
  y = 52;

  /* Score card */
  y = checkPageBreak(doc, y, 48, pageH, margin, headerColor, W);
  doc.setFillColor(255,247,237); doc.setDrawColor(253,186,116); doc.setLineWidth(0.5);
  doc.roundedRect(margin, y, W - margin * 2, 40, 3, 3, 'FD');
  doc.setTextColor(120,53,15); doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('YOUR APS SCORE', margin + (W - margin * 2) / 2, y + 9, { align:'center' });
  doc.setTextColor(217,119,6); doc.setFontSize(44);
  doc.text(String(apsScore), margin + (W - margin * 2) / 2, y + 30, { align:'center' });
  doc.setTextColor(120,53,15); doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text('out of 42 (best 6 subjects, excluding Life Orientation)', margin + (W - margin * 2) / 2, y + 37, { align:'center' });
  y += 48;

  /* Score message */
  y = checkPageBreak(doc, y, 18, pageH, margin, headerColor, W);
  var scoreMsg = apsScore >= 35 ? 'Excellent! You qualify for top competitive programmes.' :
                 apsScore >= 28 ? 'Good score - access to most professional degrees.' :
                 apsScore >= 22 ? 'Solid score - many diploma and degree options available.' :
                                  'Consider bridging/foundation programmes or TVET pathways.';
  doc.setFillColor(240,253,244); doc.setDrawColor(167,243,208);
  doc.roundedRect(margin, y, W - margin * 2, 12, 2, 2, 'FD');
  doc.setTextColor(6,95,70); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text(scoreMsg, margin + (W - margin * 2) / 2, y + 7.5, { align:'center' });
  y += 20;

  /* Subject table */
  if (subjects.length > 0) {
    var tableH = 20 + subjects.length * 9 + 12;
    y = checkPageBreak(doc, y, tableH, pageH, margin, headerColor, W);
    doc.setFillColor(255,255,255); doc.setDrawColor(229,231,235);
    doc.roundedRect(margin, y, W - margin * 2, tableH, 2, 2, 'FD');
    doc.setTextColor(17,24,39); doc.setFont('helvetica','bold'); doc.setFontSize(11);
    doc.text('Your Best 6 Subjects (Used for APS)', margin + 5, y + 9);
    var th = y + 16;
    doc.setFillColor(249,250,251); doc.rect(margin + 1, th - 4, W - margin * 2 - 2, 7, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(100,100,100);
    doc.text('Subject', margin + 5, th);
    doc.text('Mark %', W - margin - 40, th, { align:'right' });
    doc.text('APS Points', W - margin - 5, th, { align:'right' });
    subjects.forEach(function(s, i) {
      var ry = th + 8 + i * 9;
      if (i % 2 === 0) { doc.setFillColor(250,250,250); doc.rect(margin + 1, ry - 4, W - margin * 2 - 2, 8, 'F'); }
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(55,65,81);
      var nm = s.name || SUBJECT_NAMES[s.id] || s.id;
      doc.text(nm, margin + 5, ry);
      if (s.mark) doc.text(String(s.mark) + '%', W - margin - 40, ry, { align:'right' });
      var pts = s.points || s.aps || 0;
      var bCol = pts >= 6 ? [16,185,129] : pts >= 4 ? [59,130,246] : [156,163,175];
      doc.setFillColor(bCol[0], bCol[1], bCol[2]);
      doc.roundedRect(W - margin - 14, ry - 5, 10, 7, 1, 1, 'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8);
      doc.text(String(pts), W - margin - 9, ry, { align:'center' });
    });
    var totalY = th + 8 + subjects.length * 9 + 2;
    doc.setDrawColor(229,231,235); doc.line(margin + 2, totalY - 2, W - margin - 2, totalY - 2);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(17,24,39);
    doc.text('TOTAL APS', margin + 5, totalY + 5);
    doc.setTextColor(217,119,6); doc.text(String(apsScore) + ' / 42', W - margin - 5, totalY + 5, { align:'right' });
    y += tableH + 8;
  }

  /* Maths type note */
  y = checkPageBreak(doc, y, 16, pageH, margin, headerColor, W);
  doc.setFillColor(239,246,255); doc.setDrawColor(147,197,253);
  doc.roundedRect(margin, y, W - margin * 2, 12, 2, 2, 'FD');
  doc.setTextColor(30,64,175); doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text('Mathematics Type: ' + (mathType === 'mathematics' ? 'Mathematics (Pure)' : 'Mathematical Literacy'), margin + 5, y + 7.5);
  y += 20;

  /* APS interpretation table */
  var scoreRows = [
    ['35 – 42', 'Excellent', 'Top universities; Medicine, Law, Engineering (top programmes)'],
    ['28 – 34', 'Good',      'Most professional degree programmes available'],
    ['22 – 27', 'Solid',     'Diploma programmes, some degrees'],
    ['Below 22', 'Basic',    'TVET, bridging/foundation programmes recommended'],
  ];
  var interpH = 14 + scoreRows.length * 10 + 6;
  y = checkPageBreak(doc, y, interpH, pageH, margin, headerColor, W);
  doc.setFillColor(255,255,255); doc.setDrawColor(229,231,235);
  doc.roundedRect(margin, y, W - margin * 2, interpH, 2, 2, 'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(17,24,39);
  doc.text('APS Score Interpretation', margin + 5, y + 9);
  var iY = y + 14;
  doc.setFillColor(249,250,251); doc.rect(margin + 1, iY - 3, W - margin * 2 - 2, 6, 'F');
  doc.setFontSize(7); doc.setTextColor(100,100,100); doc.setFont('helvetica','bold');
  doc.text('APS RANGE', margin + 5, iY); doc.text('RATING', margin + 40, iY); doc.text('IMPLICATION', margin + 70, iY);
  iY += 4;
  scoreRows.forEach(function(row, ri) {
    if (ri % 2 === 1) { doc.setFillColor(250,250,250); doc.rect(margin + 1, iY - 1, W - margin * 2 - 2, 8, 'F'); }
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(217,119,6);
    doc.text(row[0], margin + 5, iY + 4);
    doc.setFont('helvetica','bold'); doc.setTextColor(17,24,39); doc.text(row[1], margin + 40, iY + 4);
    doc.setFont('helvetica','normal'); doc.setTextColor(55,65,81); doc.text(row[2], margin + 70, iY + 4);
    iY += 9;
  });
  y += interpH + 8;

  /* ── Eligible Courses based on APS score ── */
  var courseSet = apsScore >= 30 ? APS_COURSES.high : apsScore >= 22 ? APS_COURSES.mid : APS_COURSES.low;
  var courseColor = apsScore >= 30 ? [16,185,129] : apsScore >= 22 ? [59,130,246] : [217,119,6];
  y = drawCoursesTable(doc, y, courseSet, courseColor, W, margin, pageH);

  /* If high APS also show mid-tier options */
  if (apsScore >= 30) {
    y = checkPageBreak(doc, y, 14, pageH, margin, headerColor, W);
    doc.setFillColor(239,246,255); doc.setDrawColor(147,197,253);
    doc.roundedRect(margin, y, W - margin * 2, 10, 2, 2, 'FD');
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(30,64,175);
    doc.text('Additional options at APS 22+ also available — see bursary-portal.html for more.', margin + 5, y + 6.5);
    y += 16;
  }

  /* Bursary note */
  y = checkPageBreak(doc, y, 28, pageH, margin, headerColor, W);
  doc.setFillColor(236,253,245); doc.setDrawColor(167,243,208);
  doc.roundedRect(margin, y, W - margin * 2, 24, 2, 2, 'FD');
  doc.setTextColor(6,95,70); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('Funding Opportunities', margin + 5, y + 8);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(5,150,105);
  doc.text('Apply for NSFAS at nsfas.org.za  |  Funza Lushaka: funzalushaka.doe.gov.za', margin + 5, y + 15);
  doc.text('ISFAP: isfap.co.za  |  Ikusasa: ikusasasfap.org  |  NRF: nrf.ac.za', margin + 5, y + 21);
  y += 30;

  /* Disclaimer */
  y = checkPageBreak(doc, y, 12, pageH, margin, headerColor, W);
  doc.setFontSize(8); doc.setTextColor(150,150,150); doc.setFont('helvetica','normal');
  doc.text('APS requirements are indicative. Verify with institutions directly before applying.', margin, y);

  addFooter(doc, W, margin);
  doc.save('Phunya_Tsela_APS_Report_' + userName.replace(/\s+/g, '_') + '.pdf');
}

async function doLogout() {
  await Auth.logout();
  window.location.href = 'index.html';
}

function confirmClearHistory() {
  if (confirm('Are you sure you want to clear your entire activity history? This cannot be undone.')) {
    Auth.clearHistory(_user.id);
    renderHistory();
  }
}
