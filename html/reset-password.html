<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Phunya Tsela</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<style>
:root {
  --primary: #d97706;
  --yellow:  #f59e0b;
  --bg:      #fafaf9;
  --border:  #e5e7eb;
  --text:    #111827;
  --muted:   #6b7280;
  --error:   #ef4444;
  --radius:  12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}
h1, h2 { font-family: 'Sora', sans-serif; }
.card {
  background: white;
  border-radius: 20px;
  border: 1px solid var(--border);
  box-shadow: 0 8px 40px rgba(0,0,0,.07);
  width: 100%;
  max-width: 420px;
  overflow: hidden;
}
.card-header {
  background: linear-gradient(135deg, var(--primary), var(--yellow));
  padding: 28px 32px;
  text-align: center;
  color: white;
}
.card-header .logo { font-size: 36px; margin-bottom: 8px; }
.card-header h1 { font-size: 22px; font-weight: 900; }
.card-body { padding: 32px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.form-group input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.form-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px #fde68a44;
}
.hint { font-size: 11.5px; color: var(--muted); margin-top: 5px; }
.submit-btn {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 14px;
  background: var(--primary);
  color: white;
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
  margin-top: 8px;
  transition: filter .2s;
}
.submit-btn:hover:not(:disabled) { filter: brightness(1.08); }
.submit-btn:disabled { opacity: .6; cursor: not-allowed; }
.banner {
  border-radius: var(--radius);
  padding: 12px 14px;
  font-size: 13px;
  margin-bottom: 18px;
  display: none;
}
.banner.error   { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
.banner.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
.banner.show    { display: block; }
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin: auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
#waitingState { text-align: center; color: var(--muted); font-size: 14px; padding: 8px 0 16px; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">🔒</div>
    <h1>Create New Password</h1>
  </div>

  <div class="card-body">
    <div class="banner error"   id="errBanner"></div>
    <div class="banner success" id="okBanner"></div>

    <div id="waitingState">Verifying your reset link…</div>

    <div id="formState" style="display:none;">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="password" placeholder="Create a new password" autocomplete="new-password">
        <p class="hint">Minimum 6 characters</p>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your new password" autocomplete="new-password">
      </div>
      <button class="submit-btn" id="submitBtn" onclick="doReset()">Update Password</button>
    </div>
  </div>
</div>

<script>
function showErr(msg) {
  var b = document.getElementById('errBanner');
  b.textContent = msg;
  b.classList.add('show');
  document.getElementById('okBanner').classList.remove('show');
}
function showOk(msg) {
  var b = document.getElementById('okBanner');
  b.textContent = msg;
  b.classList.add('show');
  document.getElementById('errBanner').classList.remove('show');
}
function setLoading(yes) {
  var btn = document.getElementById('submitBtn');
  btn.disabled = yes;
  btn.innerHTML = yes ? '<div class="spinner"></div>' : 'Update Password';
}

// Supabase sends the token as a hash fragment: #access_token=...&type=recovery
// We need to let the Supabase client pick it up automatically via onAuthStateChange
window.addEventListener('load', async function () {
  // Give the Supabase client a moment to process the hash
  setTimeout(async function () {
    try {
      var sb = (typeof supabase !== 'undefined' ? supabase : window.supabase).createClient(
        'https://lfnnglzjqszdjomjmpkw.supabase.co',
        'sb_publishable_zfTqPTfONlZ04Of9ERrKww_2ICi7FCU'
      );

      var { data: { session } } = await sb.auth.getSession();

      document.getElementById('waitingState').style.display = 'none';

      if (session && session.user) {
        document.getElementById('formState').style.display = 'block';
      } else {
        showErr('This reset link is invalid or has expired. Please request a new one from the forgot password page.');
      }
    } catch(e) {
      document.getElementById('waitingState').style.display = 'none';
      showErr('Something went wrong verifying your link. Please try again.');
    }
  }, 800);
});

async function doReset() {
  var password        = document.getElementById('password').value;
  var confirmPassword = document.getElementById('confirmPassword').value;

  document.getElementById('errBanner').classList.remove('show');

  if (password.length < 6) { showErr('Password must be at least 6 characters.'); return; }
  if (password !== confirmPassword) { showErr('Passwords do not match.'); return; }

  setLoading(true);
  var result = await Auth.updatePassword(password);
  setLoading(false);

  if (result.ok) {
    document.getElementById('formState').style.display = 'none';
    showOk('Password updated successfully! Redirecting you to login…');
    setTimeout(function () { window.location.href = 'login.html'; }, 2000);
  } else {
    showErr(result.error);
  }
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doReset(); });
</script>

</body>
</html>
